<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電影搜尋系統</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input[type="text"] { padding: 10px; width: 250px; border: 1px solid #ddd; border-radius: 5px; }
        input[type="submit"] { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 電影關鍵字查詢</h1>
        <form action="/searchQ" method="post">
            <p>請輸入欲查詢的片名關鍵字：</p>
            <input type="text" name="MovieTitle" placeholder="例如：蝙蝠俠" required>
            <input type="submit" value="確定送出">
        </form>
    </div>
</body>
</html>
